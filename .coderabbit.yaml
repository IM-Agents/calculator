# https://docs.coderabbit.ai/guides/configuration-overview
# Scientific calculator: React/Vite frontend, Express backend (evaluate + session history)
language: en-US

reviews:
  profile: assertive
  request_changes_workflow: true
  review_details: true
  path_filters:
    - "!docs/**"
    - "!node_modules/**"
    - "!.cursor/**"
    - "!AGENTS.md"
    - "!**/*.md"

  path_instructions:
    - path: "frontend/src/**/*.{js,jsx}"
      instructions: |
        This path is the React 18 + Vite calculator UI. Treat these as strict blocking rules for changed lines:

        - No ad-hoc `console.log` / `console.debug` / `console.info` in production paths.
        - No unused variables, imports, or parameters in new/changed code.
        - React lists must use a stable, unique `key` on the top-level element in the list.
        - No inline object styles on JSX (`style={{ ... }}`); use `frontend/src/styles/`.
        - `fetch` to the calculator API (see `useCalculatorState.js`) must handle non-OK responses and surface errors to the user where appropriate—no silent failures.
        - Expression editing helpers (`toggleTrailingNumberSign`, `validateExpression`, keyboard handling) must stay consistent with backend `parser.js` tokenization (numbers, identifiers, operators, parentheses).
        - Sign toggle (`±`) must only rewrite when the trailing token is a numeric literal; binary `+/-` flip must treat identifiers and `)` as valid left operands, same as the parser.
        - No hardcoded secrets; client-safe config uses `import.meta.env` / `VITE_` only as appropriate.

        If any of the above appears in the diff for this path, you MUST request changes and explain the fix.

    - path: "backend/src/**/*.js"
      instructions: |
        This path is the Express API for evaluate + in-memory history (session cookie). Blocking rules for changed lines:

        - Configuration from `backend/src/config/env.js` and environment variables only—no hardcoded secrets or host-specific credentials.
        - `evaluateExpression` / `parser.js` / `mathHelpers.js`: preserve finite-result contracts (`normalizeNumber` must not return non-finite values); domain errors use structured errors with 4xx and safe messages.
        - HTTP errors: 4xx responses may include specific client-facing messages; 5xx and uncaught internals must not leak raw exception text—use generic server error messages in middleware.
        - Async route handlers must forward errors to Express (`next(err)`) or return structured JSON—no empty `catch` that hides failures.
        - History routes must respect session boundaries; do not log or return other users' history.
        - No `eval` or dynamic execution of user expressions outside the intentional parser path.

        If any of the above appears in the diff for this path, you MUST request changes and explain the fix.

  pre_merge_checks:
    custom_checks:
      - name: "Calculator app quality (frontend + backend)"
        mode: error
        instructions: |
          Respond using this exact contract:
          - First line must be exactly `PASS` or `FAIL`.
          - If first line is `PASS`, do not include any additional text.
          - If first line is `FAIL`, add one bullet per issue using: `- rule <section>.<number> in <file>: <brief reason>`.
          Base the decision only on the PR diff and touched files.

          Classify each touched file under `frontend/src/` or `backend/src/`. Ignore unrelated paths (e.g. docs-only) unless they embed secrets.

          **frontend/src** — mark `FAIL` if the diff introduces or leaves:
          1) Ad-hoc `console.log` / `console.debug` / `console.info` as permanent logging.
          2) Unused variables, imports, or parameters in modified files.
          3) List-rendered React elements without a proper `key` on the outermost list element.
          4) Inline JSX styles `style={{` ... `}}` without strong justification.
          5) New `fetch` usage without reachable error handling or user-visible failure behavior for failed requests.
          6) Hardcoded secrets or tokens in client source.
          7) Expression UI logic that can corrupt the displayed expression (e.g. sign toggle mutating a number when the last non-space token is not part of that number; binary `+/-` mis-detected after identifiers like `a-3`).
          8) Client-side validation or formatting that disagrees with backend parsing for the same expression shape.

          **backend/src** — mark `FAIL` if the diff introduces or leaves:
          1) Hardcoded credentials or secrets in source (must use env + `config/env.js`).
          2) 5xx or internal error paths that return raw `Error.message` / stack details to API clients.
          3) Parser or math helpers returning or accepting non-finite numbers where a finite result is required, including rounding overflow after scaling.
          4) Async routes or services that swallow errors (empty catch, no `next(err)`, no JSON error body).
          5) History or session handling that could mix data between sessions without clear mitigation.

          If none of the above apply to the changes in scope, respond with `PASS` only.
          If any apply, respond with `FAIL` on the first line, then include the issue bullets in the required format with rule number and file.
          If the diff is ambiguous, choose `FAIL` and include what evidence is missing in the relevant bullet reason—do not use any third label.
