<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <h1>Calculator</h1>
</body>
<script>
    const display = document.querySelector('[data-testid="display"]');
    let current = '0';
    let leftOperand = null;
    let operator = null;
    let resetOnNextDigit = false;
    function setDisplay(value) {
        display.textContent = value;
    }
    function inputDigit(digit) {
        if (resetOnNextDigit) {
            current = digit;
            resetOnNextDigit = false;
        }
        else if (current === '0') {
            current = digit;
        }
        else {
            current += digit;
        }
        setDisplay(current);
    }
    function applyOperator(nextOperator) {
        leftOperand = Number(current);
        operator = nextOperator;
        resetOnNextDigit = true;
    }
    function calculate() {
        if (leftOperand === null || operator === null) return;
        const rightOperand = Number(current);
        let result = rightOperand;
        if (operator === '+') result = leftOperand + rightOperand;
        if (operator === '-') result = leftOperand - rightOperand;
        current = String(result);
        leftOperand = null;
        operator = null;
        setDisplay(current);
        resetOnNextDigit = true;
    }
    function clearAll() {
        current = '0';
        leftOperand = null;
        operator = null;
        resetOnNextDigit = false;
        setDisplay(current);
    }
    document.querySelectorAll('button[data-testid^="btn-"]').forEach((button) => {
        const id = button.getAttribute('data-testid');
        button.addEventListener('click', () => {
            if (/^btn-\\d$/.test(id)) {
                inputDigit(id.replace('btn-', ''));
                return;
            }
            if (id === 'btn-plus') applyOperator('+');
            else if (id === 'btn-minus') applyOperator('-');
            else if (id === 'btn-equals') calculate();
            else if (id === 'btn-clear') clearAll();
        });
    });
</script>
</html>
