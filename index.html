<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        :root {
            font-family: system-ui, sans-serif;
        }
        main {
            max-width: 22rem;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        h1 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        .calculator {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 0.75rem;
            background: #f8f8f8;
        }
        .display {
            font-size: 1.5rem;
            text-align: right;
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.75rem;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            min-height: 2.25rem;
            word-break: break-all;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.35rem;
        }
        .buttons button {
            padding: 0.65rem;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid #bbb;
            border-radius: 4px;
            background: #fff;
        }
        .buttons button:hover {
            background: #eee;
        }
        .buttons button.span-2 {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <main>
        <h1>Calculator</h1>
        <p>Simple arithmetic in your browser.</p>
        <div class="calculator" id="calculator">
            <div class="display" id="display" aria-live="polite">0</div>
            <div class="buttons" id="buttons">
                <button type="button" data-action="clear">C</button>
                <button type="button" data-action="backspace">⌫</button>
                <button type="button" data-value="/">/</button>
                <button type="button" data-value="*">×</button>
                <button type="button" data-value="7">7</button>
                <button type="button" data-value="8">8</button>
                <button type="button" data-value="9">9</button>
                <button type="button" data-value="-">−</button>
                <button type="button" data-value="4">4</button>
                <button type="button" data-value="5">5</button>
                <button type="button" data-value="6">6</button>
                <button type="button" data-value="+">+</button>
                <button type="button" data-value="1">1</button>
                <button type="button" data-value="2">2</button>
                <button type="button" data-value="3">3</button>
                <button type="button" data-action="equals">=</button>
                <button type="button" data-value="0" class="span-2">0</button>
                <button type="button" data-value=".">.</button>
            </div>
        </div>
    </main>
    <script>
        let expression = '';

        function getDisplayEl() {
            return document.getElementById('display');
        }

        function updateDisplay() {
            const el = getDisplayEl();
            const text = expression.trim() === '' ? '0' : expression;
            el.textContent = text;
        }

        function tokenize(str) {
            const tokens = [];
            let i = 0;
            const s = str.replace(/\s+/g, '');
            while (i < s.length) {
                const c = s[i];
                if (c >= '0' && c <= '9' || c === '.') {
                    let num = '';
                    while (i < s.length && (s[i] >= '0' && s[i] <= '9' || s[i] === '.')) {
                        num += s[i++];
                    }
                    if (num === '.' || num.split('.').length > 2) throw new Error('Invalid number');
                    tokens.push({ type: 'num', value: Number(num) });
                    if (Number.isNaN(tokens[tokens.length - 1].value)) throw new Error('Invalid number');
                    continue;
                }
                if ('+-*/'.includes(c)) {
                    tokens.push({ type: 'op', value: c });
                    i++;
                    continue;
                }
                if (c === '(') {
                    tokens.push({ type: 'lp' });
                    i++;
                    continue;
                }
                if (c === ')') {
                    tokens.push({ type: 'rp' });
                    i++;
                    continue;
                }
                throw new Error('Invalid character');
            }
            return tokens;
        }

        /**
         * Divides a by b. Callers must catch: divide throws on division by zero.
         * @param {number} a dividend
         * @param {number} b divisor
         * @returns {number}
         * @throws {Error} Division by zero when b is 0
         */
        function divide(a, b) {
            if (b === 0) {
                throw new Error('Division by zero');
            }
            return a / b;
        }

        /**
         * Evaluates a numeric expression (+ − × /, parentheses, decimals) without eval/Function.
         * @param {string} expr
         * @returns {number|string}
         */
        function calculate(expr) {
            const trimmed = expr.trim();
            if (trimmed === '') return '0';
            let tokens;
            try {
                tokens = tokenize(trimmed);
            } catch {
                return 'Error';
            }
            if (tokens.length === 0) return '0';
            let pos = 0;
            function peek() {
                return tokens[pos];
            }
            function consume() {
                return tokens[pos++];
            }
            function parseFactor() {
                const t = peek();
                if (!t) throw new Error('Incomplete');
                if (t.type === 'num') {
                    consume();
                    return t.value;
                }
                if (t.type === 'lp') {
                    consume();
                    const inner = parseExpression();
                    const close = consume();
                    if (!close || close.type !== 'rp') throw new Error('Expected )');
                    return inner;
                }
                throw new Error('Expected value');
            }
            function parseTerm() {
                let left = parseFactor();
                while (peek() && peek().type === 'op' && (peek().value === '*' || peek().value === '/')) {
                    const op = consume().value;
                    const right = parseFactor();
                    left = op === '*' ? left * right : divide(left, right);
                }
                return left;
            }
            function parseExpression() {
                let left = parseTerm();
                while (peek() && peek().type === 'op' && (peek().value === '+' || peek().value === '-')) {
                    const op = consume().value;
                    const right = parseTerm();
                    left = op === '+' ? left + right : left - right;
                }
                return left;
            }
            try {
                const result = parseExpression();
                if (pos !== tokens.length) throw new Error('Trailing input');
                if (typeof result !== 'number' || !Number.isFinite(result)) return 'Error';
                return result;
            } catch {
                return 'Error';
            }
        }

        function handleButtonClick(event) {
            const btn = event.target.closest('button');
            if (!btn || !document.getElementById('buttons').contains(btn)) return;

            const action = btn.dataset.action;
            const value = btn.dataset.value;

            if (getDisplayEl().textContent === 'Error' && action !== 'clear' && action !== 'backspace') {
                expression = '';
            }

            if (action === 'clear') {
                expression = '';
                updateDisplay();
                return;
            }
            if (action === 'backspace') {
                expression = expression.slice(0, -1);
                updateDisplay();
                return;
            }
            if (action === 'equals') {
                const out = calculate(expression);
                expression = out === 'Error' ? '' : String(out);
                getDisplayEl().textContent = out === 'Error' ? 'Error' : expression;
                if (out === 'Error') expression = '';
                return;
            }
            if (value !== undefined) {
                expression += value;
                updateDisplay();
            }
        }

        document.getElementById('buttons').addEventListener('click', handleButtonClick);
        updateDisplay();

        window.calculate = calculate;
        window.handleButtonClick = handleButtonClick;
    </script>
</body>
</html>
